<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COFEATURE - Wheel</title>
<link rel="stylesheet" href="styles.css">
<script src="balance.js" defer></script>
<script src="vip.js" defer></script>
<script src="referral.js" defer></script>
<script src="gifts.js" defer></script>
<script src="giftbet.js" defer></script>
<script src="extras.js" defer></script>
<script src="shell.js" defer></script>
<script src="daily.js" defer></script>
<script src="social.js" defer></script>
<style>
  :root {
    --x2-color: #2f6fed;
    --x3-color: #38bdf8;
    --x5-color: #a855f7;
    --x50-color: #f59e0b;
  }
  .wheel-section {
    position: relative;
    width: 240px;
    height: 240px;
    margin: 10px 0 22px 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .wheel-pointer {
    position: absolute;
    top: -12px;
    z-index: 10;
    width: 36px;
    height: 36px;
    background: #ffffff;
    border: 4px solid var(--bg-main);
    clip-path: polygon(50% 100%, 0 0, 100% 0);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
  }
  .wheel-ring {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    padding: 14px;
    background: conic-gradient(
      var(--x2-color) 0deg 90deg,
      var(--x3-color) 90deg 150deg,
      var(--x2-color) 150deg 240deg,
      var(--x5-color) 240deg 285deg,
      var(--x2-color) 285deg 340deg,
      var(--x50-color) 340deg 360deg
    );
    box-shadow: 0 0 40px rgba(47, 111, 237, 0.15);
    transition: transform 4.5s cubic-bezier(0.15, 0.9, 0.25, 1);
  }
  .wheel-inner {
    width: 100%;
    height: 100%;
    background: #0d131f;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
  }
  .timer-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  .timer-value { font-size: 34px; font-weight: 800; color: #ffffff; margin-top: 2px; }

  .bet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 20px; }
  .bet-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 14px;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .bet-card:active { transform: scale(0.97); }
  .card-top { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .card-mult { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .card-my-bet { font-size: 15px; font-weight: 800; color: #ffffff; display: flex; justify-content: space-between; }

  .bet-x2 { border-color: rgba(47, 111, 237, 0.3); }
  .bet-x2 .dot { background: var(--x2-color); box-shadow: 0 0 6px var(--x2-color); }
  .bet-x2 .card-mult { color: var(--x2-color); }
  .bet-x3 { border-color: rgba(56, 189, 248, 0.3); }
  .bet-x3 .dot { background: var(--x3-color); box-shadow: 0 0 6px var(--x3-color); }
  .bet-x3 .card-mult { color: var(--x3-color); }
  .bet-x5 { border-color: rgba(168, 85, 247, 0.3); }
  .bet-x5 .dot { background: var(--x5-color); box-shadow: 0 0 6px var(--x5-color); }
  .bet-x5 .card-mult { color: var(--x5-color); }
  .bet-x50 { border-color: rgba(245, 158, 11, 0.3); }
  .bet-x50 .dot { background: var(--x50-color); box-shadow: 0 0 6px var(--x50-color); }
  .bet-x50 .card-mult { color: var(--x50-color); }
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a class="back-btn" href="index.html">⬅ Lobbi</a>
      <div class="brand">🎡 WHEEL</div>
    </div>
    <div class="balance-pill">💎 <span class="js-balance">0</span></div>
  </div>

  <div class="game-page-wrap">
    <div class="app-container">

      <div class="history-bar" id="history"></div>

      <div class="wheel-section">
        <div class="wheel-pointer"></div>
        <div class="wheel-ring" id="wheel">
          <div class="wheel-inner">
            <span class="timer-label" id="status-label">Boshlanishiga</span>
            <span class="timer-value" id="timer">12.0s</span>
          </div>
        </div>
      </div>

      <div id="stakeMode"></div>

      <div id="cashControls" class="quick-bets">
        <button class="quick-btn" onclick="selectBetAmount(100, event)">+100</button>
        <button class="quick-btn" onclick="selectBetAmount(500, event)">+500</button>
        <button class="quick-btn" onclick="selectBetAmount(1000, event)">+1 000</button>
        <button class="quick-btn" onclick="selectBetAmount('MAX', event)">MAX</button>
      </div>

      <div class="bet-grid">
        <div class="bet-card bet-x2" onclick="placeBet('x2')">
          <div class="card-top"><span class="card-mult"><span class="dot"></span> 2X</span><span style="font-size:11px;color:#64748b;">50%</span></div>
          <div class="card-my-bet"><span style="color:#64748b;font-size:12px;">Sizniki:</span><span><span id="my-x2">0</span> 💎</span></div>
        </div>
        <div class="bet-card bet-x3" onclick="placeBet('x3')">
          <div class="card-top"><span class="card-mult"><span class="dot"></span> 3X</span><span style="font-size:11px;color:#64748b;">30%</span></div>
          <div class="card-my-bet"><span style="color:#64748b;font-size:12px;">Sizniki:</span><span><span id="my-x3">0</span> 💎</span></div>
        </div>
        <div class="bet-card bet-x5" onclick="placeBet('x5')">
          <div class="card-top"><span class="card-mult"><span class="dot"></span> 5X</span><span style="font-size:11px;color:#64748b;">15%</span></div>
          <div class="card-my-bet"><span style="color:#64748b;font-size:12px;">Sizniki:</span><span><span id="my-x5">0</span> 💎</span></div>
        </div>
        <div class="bet-card bet-x50" onclick="placeBet('x50')">
          <div class="card-top"><span class="card-mult"><span class="dot"></span> 50X</span><span style="font-size:11px;color:#64748b;">5%</span></div>
          <div class="card-my-bet"><span style="color:#64748b;font-size:12px;">Sizniki:</span><span><span id="my-x50">0</span> 💎</span></div>
        </div>
      </div>

      <div class="game-subtitle">Tikish qo'yish uchun avval miqdorni tanlang, so'ng kartaga bosing.</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentBetAmount = 100;
    let timeLeft = 12.0;
    let isSpinning = false;
    let timerId;
    let currentRotation = 0;
    let myBets = { x2: 0, x3: 0, x5: 0, x50: 0 };
    let giftBetSlot = null;      // gift rejimida tikilgan yagona slot
    let giftBetStakeInfo = null; // shu slotga tikilgan sovg'a ma'lumoti
    const colors = { x2: '#2f6fed', x3: '#38bdf8', x5: '#a855f7', x50: '#f59e0b' };

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.className = 'toast show ' + (type || '');
      if (window.skzOnToast) window.skzOnToast(type);
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    function selectBetAmount(amount, ev) {
      currentBetAmount = amount === 'MAX' ? skzGetBalance() : amount;
      document.querySelectorAll('.quick-btn').forEach(btn => btn.classList.remove('active'));
      if (ev) ev.target.classList.add('active');
    }

    function placeBet(type) {
      if (isSpinning) return;

      if (skzStake.mode === 'gift') {
        if (giftBetSlot) {
          showToast("Bitta turda faqat bitta sovg'a tikish mumkin!", 'lose');
          return;
        }
        if (!skzGiftBetCanPlace(0)) {
          showToast("Avval inventardan sovg'a tanlang!", 'lose');
          return;
        }
        giftBetStakeInfo = skzGiftBetConsume(0);
        giftBetSlot = type;
        document.getElementById(`my-${type}`).innerHTML = `🎁 <img src="${skzGiftSrc(giftBetStakeInfo.stakedItem.file)}" alt="${giftBetStakeInfo.stakedItem.name}" style="width:18px;height:18px;object-fit:contain;vertical-align:middle;">`;
        showToast(`🎁 ${giftBetStakeInfo.stakedItem.name} ${type.toUpperCase()} ga tikildi!`, 'win');
        return;
      }

      if (currentBetAmount <= 0 || skzGetBalance() < currentBetAmount) {
        showToast("Balansingizda mablag' yetarli emas!", 'lose');
        return;
      }
      skzAddBalance(-currentBetAmount);
      myBets[type] += currentBetAmount;
      document.getElementById(`my-${type}`).innerText = skzFmt(myBets[type]);
    }

    function startRound() {
      isSpinning = false;
      timeLeft = 12.0;
      document.getElementById('status-label').innerText = "Boshlanishiga";
      document.getElementById('timer').style.color = "#ffffff";

      timerId = setInterval(() => {
        timeLeft -= 0.1;
        document.getElementById('timer').innerText = timeLeft.toFixed(1) + 's';
        if (timeLeft <= 0) {
          clearInterval(timerId);
          spinWheel();
        }
      }, 100);
    }

    function spinWheel() {
      isSpinning = true;
      document.getElementById('status-label').innerText = "Aylanmoqda...";
      document.getElementById('timer').innerText = "🎲";

      const rand = Math.random();
      let winner, targetAngle;
      if (rand < 0.50) { winner = 'x2'; targetAngle = 45; }
      else if (rand < 0.80) { winner = 'x3'; targetAngle = 120; }
      else if (rand < 0.95) { winner = 'x5'; targetAngle = 260; }
      else { winner = 'x50'; targetAngle = 350; }

      const spins = 360 * 6;
      const finalAngle = spins + (360 - targetAngle);
      currentRotation += finalAngle;
      document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        const winText = winner.toUpperCase();
        document.getElementById('status-label').innerText = "G'OLIB";
        document.getElementById('timer').innerText = winText;
        document.getElementById('timer').style.color = colors[winner];

        const hist = document.getElementById('history');
        const div = document.createElement('div');
        div.className = 'history-item';
        div.style.color = colors[winner];
        div.innerText = winText;
        hist.prepend(div);
        if (hist.children.length > 8) hist.removeChild(hist.lastChild);

        if (myBets[winner] > 0) {
          const mult = parseInt(winner.replace('x', ''));
          const winAmount = myBets[winner] * mult;
          skzAddBalance(winAmount);
          showToast(`🎉 G'olib bo'ldingiz! +${skzFmt(winAmount)} 💎`, 'win');
        }

        if (giftBetSlot) {
          const mult = parseInt(giftBetSlot.replace('x', ''));
          if (giftBetSlot === winner) {
            const outcome = skzGiftBetResolveWin(giftBetStakeInfo, mult);
            if (outcome.type === 'gift') {
              showToast(`🎉 Sovg'a g'alabasi! ${outcome.from.name} → ${outcome.gift.name} 🎁`, 'win');
            }
          } else {
            const outcome = skzGiftBetResolveLose(giftBetStakeInfo);
            showToast(`💥 ${outcome.from.name} kuydi.`, 'lose');
          }
        }

        setTimeout(() => {
          myBets = { x2: 0, x3: 0, x5: 0, x50: 0 };
          giftBetSlot = null;
          giftBetStakeInfo = null;
          ['x2','x3','x5','x50'].forEach(k => document.getElementById(`my-${k}`).innerText = '0');
          startRound();
        }, 3000);
      }, 4500);
    }

    window.onload = () => {
      startRound();
      skzGiftBetInitUI('stakeMode', () => {
        document.getElementById('cashControls').style.display = skzStake.mode === 'gift' ? 'none' : 'flex';
      });
    };
  </script>
</body>
</html>
